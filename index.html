<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width">
    <title>AI Pentest Assistant</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:system-ui;background:#0a0a0a;color:#fff;height:100vh;display:flex;flex-direction:column}
        .header{background:linear-gradient(90deg,#1a1a2e,#16213e);padding:1rem;text-align:center;box-shadow:0 4px 20px rgba(0,0,0,.5)}
        .chat{flex:1;overflow-y:auto;padding:2rem;max-width:900px;margin:0 auto;width:100%;display:flex;flex-direction:column;gap:1rem}
        .message{padding:1rem 1.5rem;border-radius:18px;max-width:80%;word-wrap:break-word}
        .user{background:#10a37f;align-self:flex-end}
        .ai{background:#2a2a3a;align-self:flex-start}
        .input-area{padding:2rem 0;background:#0a0a0a;position:sticky;bottom:0}
        .input-wrapper{display:flex;gap:.5rem;max-width:900px;margin:0 auto;width:100%}
        input{flex:1;padding:1rem;border:none;border-radius:25px;background:#1a1a2e;color:#fff;font-size:1rem}
        input::placeholder{color:#666}
        button{padding:.8rem 1.5rem;background:#10a37f;color:#fff;border:none;border-radius:25px;cursor:pointer;font-weight:500}
        button:hover{background:#0d8e6b}
        .loading{display:inline-block;width:20px;height:20px;border:2px solid #333;border-top:2px solid #10a37f;border-radius:50%;animation:spin 1s linear infinite}
        @keyframes spin{0%{transform:rotate(0)}100%{transform:rotate(360deg)}}
        @media(max-width:768px){.chat{padding:1rem}.input-wrapper{padding:0 1rem;flex-direction:column}.input-area{padding:1rem 0}}
    </style>
</head>
<body>
    <div class="header">
        <h1>🤖 AI Pentest Assistant</h1>
        <p>Authorized Security Assessment Tool</p>
    </div>
    <div class="chat" id="chat"></div>
    <div class="input-area">
        <div class="input-wrapper">
            <input id="message" placeholder="Ask about vulnerabilities, exploits, payloads..." autocomplete="off">
            <button onclick="send()">Send</button>
        </div>
    </div>
    
    <script>
    const API_URL = '/chatgpt.php';
    const chat = document.getElementById('chat');
    const input = document.getElementById('message');
    
    input.focus();
    input.addEventListener('keypress', e => e.key==='Enter' && send());
    
    async function send() {
        const msg = input.value.trim();
        if(!msg) return;
        
        addMessage('user', msg);
        input.value = '';
        
        const btn = event.target;
        btn.innerHTML = '<div class="loading"></div>';
        btn.disabled = true;
        
        try {
            const res = await fetch(API_URL, {
                method: 'POST',
                headers: {'Content-Type':'application/json'},
                body: JSON.stringify({
                    messages: [{role:'user', content:msg}]
                })
            });
            const data = await res.json();
            addMessage('ai', data.choices?.[0]?.message?.content || 'No response');
        } catch(e) {
            addMessage('ai', '❌ API Error - Check console');
            console.error(e);
        }
        
        btn.innerHTML = 'Send';
        btn.disabled = false;
        chat.scrollTop = chat.scrollHeight;
    }
    
    function addMessage(type, content) {
        const div = document.createElement('div');
        div.className = `message ${type}`;
        div.textContent = content;
        chat.appendChild(div);
        chat.scrollTop = chat.scrollHeight;
    }
    </script>
</body>
</html>
